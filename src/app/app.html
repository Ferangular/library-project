<lib-card
  title="Demo de first-library"
  subtitle="Ejemplo de componente + servicio + componente visual"
>
  <p>
    Esta tarjeta viene desde la librería. Los botones disparan el servicio y
    la notificación también viene desde la librería.
  </p>


  <div class="actions">
    <lib-button variant="primary" (pressed)="showSuccess()">
      Mostrar success
    </lib-button>

    <lib-button variant="secondary" (pressed)="showInfo()">
      Mostrar info
    </lib-button>

    <lib-button variant="danger" (pressed)="showError()">
      Mostrar error
    </lib-button>
  </div>
  <lib-notification></lib-notification>
</lib-card>
