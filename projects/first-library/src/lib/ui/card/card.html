<div class="card">
  <div class="card-header">
    @if (title() || subtitle()) {
      <div class="lib-card__header">
        @if (title()) {
          <h3 class="lib-card__title">{{ title() }}</h3>
        }

        @if (subtitle()) {
          <p class="lib-card__subtitle">{{ subtitle() }}</p>
        }
      </div>
    }
  </div>
  <div class="card-body">
    <ng-content></ng-content>
  </div>
</div>
