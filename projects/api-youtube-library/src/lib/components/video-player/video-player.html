<div class="video-wrapper">
  <iframe
    [src]="id() | youtube"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen
    loading="lazy"
    [attr.aria-label]="'Playing YouTube video: ' + id()">
  </iframe>
</div>
