<div class="buscador-usuario">
  <div class="buscador-usuario__container">
    <div class="buscador-usuario__input-wrapper">
      <input 
        class="buscador-usuario__input"
        [formControl]="busquedaControl" 
        (keydown)="onBuscar($event)" 
        placeholder="Buscar usuario..."
        type="text">
      <div class="buscador-usuario__icon">
        <svg class="buscador-usuario__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </div>
    </div>
  </div>

  @if (mostrarResultados()) {
    <div class="buscador-usuario__results">
      <uw-usuario [busqueda]="textoBusqueda()"></uw-usuario>
    </div>
  }
</div>
